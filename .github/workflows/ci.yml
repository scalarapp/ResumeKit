name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch when a new commit lands —
# keeps the Actions queue short and gives us fast feedback on iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test (macOS, Swift ${{ matrix.swift }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        # ResumeKit targets iOS 15+, so we need a Swift that can compile
        # against that SDK. The default Xcode on macos-14 is 15.x, which
        # ships Swift 5.10 — our Package.swift minimum.
        swift: ["5.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v --parallel

  test-linux:
    name: Test (Linux, Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.10", "6.0"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v --parallel
