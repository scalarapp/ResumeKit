name: Trigger docs rebuild

on:
  push:
    branches: [main]
    # Only notify the hub when something that affects docs changes.
    # Library consumers mostly care about public API (Sources/) and
    # package surface (Package.swift); a tweak to tests or CI doesn't
    # need a fresh docs build.
    paths:
      - 'Sources/**'
      - 'Package.swift'
      - 'README.md'
  workflow_dispatch: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scalarapp/docs rebuild
        env:
          # Fine-grained PAT with `contents: write` on scalarapp/docs.
          # If unset (fresh repo / forgotten setup), we skip silently —
          # the hub's nightly cron at 04:17 UTC will pick up any change
          # within 24h, so missing this dispatch is low-impact.
          TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::DOCS_DISPATCH_TOKEN is not set — skipping dispatch."
            echo "The hub's nightly cron will rebuild within 24h regardless."
            exit 0
          fi

          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/scalarapp/docs/dispatches \
            -d "{\"event_type\":\"library-docs-updated\",\"client_payload\":{\"library\":\"resumekit\",\"commit\":\"${{ github.sha }}\"}}"
          echo "Dispatched library-docs-updated to scalarapp/docs"
